name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prettier --check app supabase/schema scripts lib
      - run: npx eslint

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run type:check

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Create env file
        run: |
          echo "SUPABASE_JWT_SECRET=super-secret-jwt-token-with-at-least-32-characters-long" > .env.dev
          echo "NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321" >> .env.dev
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=dummy-anon-key" >> .env.dev
          echo "SUPABASE_JWT_ROLE=authenticated" >> .env.dev
      - run: npm run test:ci

